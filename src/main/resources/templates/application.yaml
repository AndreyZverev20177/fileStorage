# application.yml (можно использовать вместо application.properties)
spring:
  datasource:
    url: jdbc:h2:file:~/filestorage/db
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    org.springframework.security: DEBUG
    com.filestorage: DEBUG
    org.springframework.web: DEBUG

file:
  storage:
    root-path: ./storage

jwt:
  secret: mySecretKeyForJWTTokenGenerationAndValidation2024
  expiration: 86400000